name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  # ─── Python 后端检测 ──────────────────────────────────────
  backend:
    name: Backend (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff pytest pytest-asyncio httpx

      - name: Lint (ruff)
        run: ruff check backend/

      - name: Format check (ruff format)
        run: ruff format --check backend/

      - name: Compile Python entrypoints
        run: >-
          python -m py_compile
          start.py
          backend/main.py
          backend/agent.py
          backend/env_bootstrap.py
          backend/tool_registry.py
          backend/tool_registry_routes.py
          backend/agent_run_events.py
          backend/visual_event_bus.py
          backend/automation_store.py
          backend/automation_runner.py
          backend/automation_routes.py

      - name: Run tests
        env:
          LLM_BACKEND: ollama
          OLLAMA_HOST: http://127.0.0.1:11434   # 不会真正连接，单测 mock
          AGENT_DEFAULT_MODEL: qwen3:14b
          HABIT_CHECK_ENABLED: "false"
        run: |
          if [ -d backend/tests ]; then
            pytest backend/tests/ -v --tb=short
          else
            echo "No backend/tests directory yet — add tests under backend/tests/"
          fi

  # ─── 前端检测 ─────────────────────────────────────────────
  frontend:
    name: Frontend (Node 20)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        run: |
          npm ci
          test -f package-lock.json || (echo "missing frontend/package-lock.json" && exit 1)

      - name: Lint
        working-directory: frontend
        run: npm run lint --if-present

      - name: Type check
        working-directory: frontend
        run: npm run typecheck --if-present

      - name: Build
        working-directory: frontend
        run: npm run build

  # ─── 安全扫描 ─────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Audit Python dependencies
        run: pip-audit -r requirements.txt || true

      - name: Check for secrets (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true   # 初始阶段警告不阻断 CI

  # ─── 合并状态徽章门控 ─────────────────────────────────────
  all-green:
    name: All checks passed
    runs-on: ubuntu-latest
    needs: [backend, frontend, security]
    steps:
      - run: echo "✅ All CI checks passed"
