// ── 骨骼工具 ──
function setBone(name, x, y, z) {
  if (!vrm?.humanoid) return;
  const bone = vrm.humanoid.getBoneNode(THREE_VRM.HumanoidBoneName[name]);
  if (bone) bone.rotation.set(x, y, z);
}
// ── 材质更新 ──
function updateMaterial(keyword, mat) {
  if (!vrm) return;
  vrm.scene.traverse(o => {
    if (o.isMesh && o.name.includes(keyword)) {
      o.material = mat || new THREE.MeshStandardMaterial({color:0xffd6c2,roughness:0.35,metalness:0,transparent:true});
      o.material.needsUpdate = true;
      o.material.alphaTest = 0.1;
    }
  });
}
// ── 切换 ──
function changeCloth(id) { currentState.cloth = id; updateMaterial('Body', clothes[id]); }
function changeHair(id) { currentState.hair = id; updateMaterial('Hair', hair[id]); }
function changeShoe(id) { currentState.shoe = id; updateMaterial('Foot', shoes[id]); }
async function changeAcc(id) {
  currentState.acc = id;
  if (!vrm) return;
  vrm.scene.children = vrm.scene.children.filter(c => !c.userData?.isAcc);
  if (id === 0 || !accessories[id]) return;
  try {
    const al = new THREE_VRM.VRMLoader();
    const am = await al.loadAsync(accessories[id]);
    am.scene.userData = { isAcc: true };
    vrm.scene.add(am.scene);

  for (const [b, r] of Object.entries(p)) setBone(b, r[0], r[1], r[2]);
  document.getElementById('status').textContent = '✦ ' + name;

}

/* ================================================================
   核心初始化
   ================================================================ */
async function init() {
try {
  scene = new THREE.Scene();
  camera = new THREE.PerspectiveCamera(32, innerWidth / innerHeight, 0.1, 20);
  camera.position.set(0, 1.4, 3.8);
  renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true, premultipliedAlpha: true });
  renderer.setSize(innerWidth, innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.outputEncoding = THREE.sRGBEncoding;
  renderer.setClearColor(0x05020E, 1);
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  document.body.appendChild(renderer.domElement);

  // 打光
  const ml = new THREE.DirectionalLight(0xf0f4fc, 3.0);
  ml.position.set(2, 3, 2); ml.castShadow = true;
  ml.shadow.mapSize.width = 4096; ml.shadow.mapSize.height = 4096;
  ml.shadow.radius = 8; ml.shadow.camera.near = 0.5; ml.shadow.camera.far = 50;
  scene.add(ml);
  const fl = new THREE.DirectionalLight(0xf8f0e8, 1.2);
  fl.position.set(-1, 2, 1); scene.add(fl);
  scene.add(new THREE.AmbientLight(0xf8f5fc, 2.0));
  scene.add(new THREE.HemisphereLight(0xf0f4fc, 0x8080a0, 0.8));
  scene.fog = new THREE.FogExp2(0x05020E, 0.015);

  // 程序化创建白月光人形（完整骨骼+网格）
  const avatar = createProceduralAvatar();
  vrm = avatar;
  scene.add(vrm.scene);
  mixer = new THREE.AnimationMixer(vrm.scene);
  console.log('✅ 程序化人形模型就绪（20骨骼+全身网格）');

  setupAllMaterials();
  updateMaterial('Body', clothes[1]);
  updateMaterial('Hair', hair[1]);

  try {
    voice = new Howl({ src: [basePath + 'voice/soft_clear.mp3'], volume: 0.9, rate: 0.95, format: ['mp3'], onload: () => console.log('✅ 声音就绪'), onloaderror: () => console.warn('⚠️ 声音文件未找到') });
  } catch (e) { console.warn('声音跳过'); }

  setupInteraction();
  animate();
  alert('✅ 白月光·全配加载完成！\n✨ 衣服24套 | 发型8款 | 首饰4套 | 鞋子3款 | 动作8种');

} catch (err) {
  alert('❌ 加载失败：' + err.message);
  console.error(err);
}
}

/* ================================================================
   动态生命：呼吸 + 心跳 + 眼神漂移 + 微表情
   ================================================================ */
function updateLifeCycle() {
  if (!vrm) return;
  const t = performance.now() * 0.001;
  const breath = Math.sin(t * 1.5);
  setBone('Chest', breath * 0.04, 0, breath * 0.03);
  setBone('Spine', 0, 0, Math.sin(t * 1.5 + 0.5) * 0.02);
  const beat = Math.pow(Math.sin(t * 7.85), 8) * 0.001;
  setBone('Chest', beat + breath * 0.04, 0, beat * 0.5 + breath * 0.03);
  setBone('Mouth', 0, Math.sin(t * 0.8) * 0.02, 0);
}

/* ================================================================
   交互：视线跟随 + 点击反馈
   ================================================================ */
function setupInteraction() {
  window.addEventListener('mousemove', e => {
    const mx = (e.clientX / innerWidth) * 2 - 1;
    const my = -(e.clientY / innerHeight) * 2 + 1;
    eyeX = THREE.MathUtils.lerp(eyeX, mx * 0.12, 0.1);
    eyeY = THREE.MathUtils.lerp(eyeY, my * 0.12, 0.1);
    headRot.y = THREE.MathUtils.lerp(headRot.y, mx * 0.06, 0.05);
    headRot.x = THREE.MathUtils.lerp(headRot.x, my * 0.05, 0.05);
    if (vrm) { setBone('Head', headRot.x, headRot.y, 0); }
  });

  const rc = new THREE.Raycaster();
  window.addEventListener('click', e => {
    if (!vrm) return;
    const mx = (e.clientX / innerWidth) * 2 - 1;
    const my = -(e.clientY / innerHeight) * 2 + 1;
    rc.setFromCamera({ x: mx, y: my }, camera);
    const hits = rc.intersectObject(vrm.scene, true);
    if (hits.length > 0) {
      const obj = hits[0].object;
      const st = document.getElementById('status');
      if (obj.name.includes('Hand')) { setBone('LeftHand', 0.15, 0, 0); st.textContent = '✦ 触碰·手'; }
      else if (obj.name.includes('Face') || obj.name.includes('Head')) { setBone('Head', 0, 0.1, 0); st.textContent = '✦ 触碰·脸颊'; }
      else if (obj.name.includes('Hair')) { st.textContent = '✦ 触碰·发丝'; }
      setTimeout(() => { st.textContent = ''; }, 1500);
    }
  });
}

/* ================================================================
   渲染循环
   ================================================================ */
function animate() {
  requestAnimationFrame(animate);
  time = performance.now() * 0.001;
  if (mixer) mixer.update(1 / 60);
  updateLifeCycle();
  // 应用视线跟随
  if (vrm) {
    setBone('LeftEye', eyeX, eyeY, 0);
    setBone('RightEye', eyeX + 0.005, eyeY, 0);
  }
  renderer.render(scene, camera);
}

window.onresize = () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
};

init();
</script>
