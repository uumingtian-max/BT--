<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>本地 Agent</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
  <body class="bg-slate-950 text-slate-100 min-h-screen">
  <p class="text-slate-400 text-sm px-6 pt-2">主界面为聊天式 Agent：在 React 里用自然语言即可（侧栏「工具」模式会走后端工具链）。启动：<code class="bg-slate-800 px-1 rounded">cd frontend && npm start</code></p>
  <div class="max-w-2xl mx-auto p-6 space-y-6">
    <h1 class="text-2xl font-semibold">本地 Agent 控制台</h1>
    <p class="text-slate-400 text-sm">先在本机终端运行：<code class="bg-slate-800 px-1 rounded">python main.py</code> 或 <code class="bg-slate-800 px-1 rounded">uvicorn main:app --reload</code></p>

    <section class="space-y-2">
      <label class="block text-sm text-slate-400">任务描述</label>
      <textarea id="q" rows="3" class="w-full rounded-lg bg-slate-900 border border-slate-700 p-3 text-sm" placeholder="例如：生成图像：一只猫@紧急"></textarea>
      <label class="inline-flex items-center gap-2 text-sm">
        <input type="checkbox" id="useLlm" checked class="rounded" />
        使用本地 LLM 分解（关则纯规则按 +/，拆分）
      </label>
      <button id="btnAgent" class="px-4 py-2 rounded-lg bg-indigo-600 hover:bg-indigo-500 text-sm font-medium">提交 /agent</button>
      <pre id="outAgent" class="text-xs bg-slate-900 border border-slate-800 rounded-lg p-3 overflow-auto max-h-48"></pre>
    </section>

    <section class="space-y-2 border-t border-slate-800 pt-6">
      <h2 class="text-lg font-medium">图像生成（需 ENABLE_LOCAL_SD=1）</h2>
      <input id="imgPrompt" class="w-full rounded-lg bg-slate-900 border border-slate-700 p-2 text-sm" placeholder="prompt" value="a cat dancing, simple background" />
      <button id="btnImg" class="px-4 py-2 rounded-lg bg-emerald-700 hover:bg-emerald-600 text-sm">POST /generate_image</button>
      <pre id="outImg" class="text-xs bg-slate-900 border border-slate-800 rounded-lg p-3 overflow-auto max-h-32"></pre>
    </section>

    <section class="space-y-2 border-t border-slate-800 pt-6">
      <h2 class="text-lg font-medium">语音识别</h2>
      <input type="file" id="wav" accept="audio/*,.wav,.mp3,.m4a" class="text-sm" />
      <button id="btnStt" class="px-4 py-2 rounded-lg bg-amber-700 hover:bg-amber-600 text-sm">POST /speech_to_text</button>
      <pre id="outStt" class="text-xs bg-slate-900 border border-slate-800 rounded-lg p-3 overflow-auto max-h-32"></pre>
    </section>
  </div>
  <script>
    const api = (path, opts) => fetch(path, opts).then(r => r.json()).then(j => JSON.stringify(j, null, 2)).catch(e => String(e));

    document.getElementById('btnAgent').onclick = async () => {
      const body = { query: document.getElementById('q').value, use_llm: document.getElementById('useLlm').checked };
      document.getElementById('outAgent').textContent = await api('/agent', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
    };
    document.getElementById('btnImg').onclick = async () => {
      const body = { prompt: document.getElementById('imgPrompt').value, output_path: 'outputs/sd_out.png' };
      document.getElementById('outImg').textContent = await api('/generate_image', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
    };
    document.getElementById('btnStt').onclick = async () => {
      const f = document.getElementById('wav').files[0];
      if (!f) { alert('请选择音频文件'); return; }
      const fd = new FormData();
      fd.append('file', f);
      document.getElementById('outStt').textContent = await fetch('/speech_to_text', { method: 'POST', body: fd })
        .then(r => r.json()).then(j => JSON.stringify(j, null, 2)).catch(e => String(e));
    };
  </script>
</body>
</html>
