# Sample Telegraf: scrape local AI Agent backend (Prometheus text)
# Repo: https://github.com/influxdata/telegraf — adjust outputs to your stack.

[[inputs.prometheus]]
  urls = ["http://127.0.0.1:8000/telegraf/prometheus"]
  metric_name_format = "snake_case"
  url_tag = "source"

