version: "3.9"

# ONYX-OVERRIDE  docker-compose
# 用途：在 Linux/Mac 服务器上一键运行后端（不含 Electron 桌面壳）
# 使用：
#   docker compose up -d        # 后台启动
#   docker compose logs -f      # 查看日志
#   docker compose down         # 停止

services:
  # ─── Ollama（本地 LLM 运行时） ─────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: onyx_ollama
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    # GPU 支持（需要 nvidia-container-toolkit）
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ─── ONYX 后端 ────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: onyx_backend
    restart: unless-stopped
    depends_on:
      ollama:
        condition: service_healthy
    env_file:
      - backend/.env
    environment:
      - OLLAMA_HOST=http://ollama:11434   # 覆盖 .env，指向同网络内的 ollama
      - BACKEND_HOST=0.0.0.0
      - BACKEND_PORT=8000
    ports:
      - "8000:8000"
    volumes:
      - ./backend/agent_skills:/app/agent_skills
      - ./outputs:/app/outputs
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 20s
      timeout: 5s
      retries: 3

  # ─── 前端（生产静态文件，可选） ──────────────────────────
  frontend:
    image: nginx:alpine
    container_name: onyx_frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"

volumes:
  ollama_data:

networks:
  default:
    name: onyx_net
